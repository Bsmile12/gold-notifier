<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold Monitor — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #080b10;
      --panel: rgba(16, 22, 34, 0.9);
      --border: rgba(255,255,255,0.08);
      --gold: #F5C453;
      --green: #00E676;
      --red: #FF1744;
      --blue: #0088cc;
      --purple: #9C27B0;
      --orange: #FF9800;
      --text: #F3F4F6;
      --muted: #6B7280;
      --font: 'Outfit', sans-serif;
      --mono: 'Space Grotesk', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #0d1a2e 0%, #080b10 70%);
    }
    .login-box {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px; width: 360px;
      backdrop-filter: blur(12px); text-align: center;
    }
    .login-box .lock-icon { font-size: 2.5rem; color: var(--gold); margin-bottom: 16px; }
    .login-box h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .login-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.4);
      border: 1px solid var(--border); border-radius: 10px; color: var(--text);
      font-family: var(--mono); font-size: 1rem; outline: none; margin-bottom: 16px;
      letter-spacing: 2px;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%; padding: 13px; background: var(--gold); color: #080b10;
      border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-error { color: var(--red); font-size: 0.85rem; margin-top: 12px; display: none; }

    /* DASHBOARD */
    #dashboard { display: none; flex-direction: column; min-height: 100vh; }

    /* TOP BAR */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; border-bottom: 1px solid var(--border);
      background: rgba(10, 14, 22, 0.95); backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-left .logo { font-size: 1.1rem; font-weight: 700; color: var(--gold); }
    .topbar-left .badge {
      background: rgba(255,23,68,0.15); border: 1px solid rgba(255,23,68,0.4);
      color: var(--red); font-size: 0.72rem; font-weight: 700; padding: 2px 8px;
      border-radius: 20px; letter-spacing: 1px; text-transform: uppercase;
    }
    .live-dot {
      width: 8px; height: 8px; background: var(--green); border-radius: 50%;
      box-shadow: 0 0 8px var(--green); animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    #live-price-top {
      font-family: var(--mono); font-size: 1.2rem; font-weight: 700; color: var(--gold);
    }
    .logout-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* STATS ROW */
    .stats-row {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px;
      padding: 20px 28px 0;
    }
    .stat-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      padding: 16px 20px;
    }
    .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .stat-value { font-family: var(--mono); font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
    .stat-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .c-gold { color: var(--gold); }
    .c-green { color: var(--green); }
    .c-blue { color: var(--blue); }
    .c-purple { color: var(--purple); }
    .c-orange { color: var(--orange); }

    /* LOG PANEL */
    .log-section { padding: 20px 28px 28px; flex: 1; display: flex; flex-direction: column; gap: 14px; }
    .log-toolbar {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab {
      padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted);
      transition: all 0.2s;
    }
    .tab.active, .tab:hover { background: rgba(255,255,255,0.08); color: var(--text); border-color: rgba(255,255,255,0.2); }
    .tab[data-type="all"].active { border-color: var(--text); color: var(--text); }
    .tab[data-type="price"].active { border-color: var(--gold); color: var(--gold); }
    .tab[data-type="alert"].active { border-color: var(--green); color: var(--green); }
    .tab[data-type="error"].active { border-color: var(--red); color: var(--red); }
    .tab[data-type="push"].active { border-color: var(--blue); color: var(--blue); }
    .tab[data-type="telegram"].active { border-color: var(--blue); color: var(--blue); }
    .tab[data-type="system"].active { border-color: var(--purple); color: var(--purple); }

    .toolbar-right { display: flex; gap: 8px; align-items: center; }
    .clear-btn {
      padding: 6px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(255,23,68,0.3); background: rgba(255,23,68,0.08);
      color: var(--red); transition: all 0.2s;
    }
    .clear-btn:hover { background: rgba(255,23,68,0.18); }
    .pause-btn {
      padding: 6px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: rgba(255,255,255,0.05);
      color: var(--muted); transition: all 0.2s;
    }
    .pause-btn.paused { border-color: var(--orange); color: var(--orange); }
    #log-count-badge { font-size: 0.78rem; color: var(--muted); }

    /* LOG LIST */
    .log-container {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; flex: 1;
    }
    #log-list {
      height: calc(100vh - 320px); overflow-y: auto; padding: 8px 0;
    }
    #log-list::-webkit-scrollbar { width: 6px; }
    #log-list::-webkit-scrollbar-track { background: transparent; }
    #log-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    .log-entry {
      display: grid;
      grid-template-columns: 80px 70px 1fr;
      gap: 12px; align-items: start;
      padding: 8px 18px; border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s; font-size: 0.875rem;
    }
    .log-entry:hover { background: rgba(255,255,255,0.03); }
    .log-entry:last-child { border-bottom: none; }
    .log-time { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); white-space: nowrap; padding-top: 1px; }
    .log-type-badge {
      font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      text-align: center; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px;
      width: fit-content;
    }
    .badge-price    { background: rgba(245,196,83,0.12); color: var(--gold); }
    .badge-alert    { background: rgba(0,230,118,0.12);  color: var(--green); }
    .badge-error    { background: rgba(255,23,68,0.12);  color: var(--red); }
    .badge-push     { background: rgba(0,136,204,0.12);  color: var(--blue); }
    .badge-telegram { background: rgba(0,136,204,0.12);  color: var(--blue); }
    .badge-system   { background: rgba(156,39,176,0.12); color: var(--purple); }
    .log-msg { color: var(--text); line-height: 1.45; word-break: break-word; }
    .log-entry.type-error .log-msg { color: #ff6b6b; }
    .log-entry.type-alert .log-msg { color: #6bffb8; }

    .empty-log {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 20px; color: var(--muted); gap: 10px;
    }
    .empty-log i { font-size: 2rem; opacity: 0.3; }

    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .log-entry { grid-template-columns: 70px 60px 1fr; gap: 8px; font-size: 0.82rem; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="lock-icon"><i class="fa-solid fa-shield-halved"></i></div>
    <h2>Admin Panel</h2>
    <p>Gold Monitor — เข้าสู่ระบบเจ้าของ</p>
    <input type="password" id="pw-input" placeholder="รหัสผ่าน" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="login-error" id="login-error">รหัสผ่านไม่ถูกต้อง</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo"><i class="fa-solid fa-coins"></i> Gold Admin</span>
      <span class="badge">Admin Only</span>
      <div class="live-dot" id="live-dot"></div>
    </div>
    <div class="topbar-right">
      <span id="live-price-top">$0.00</span>
      <button class="logout-btn" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> ออก</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">ราคา XAU/USD</div>
      <div class="stat-value c-gold" id="s-price">$0.00</div>
      <div class="stat-sub" id="s-change">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Uptime</div>
      <div class="stat-value c-green" id="s-uptime">0s</div>
      <div class="stat-sub">Server online</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active Alerts</div>
      <div class="stat-value c-blue" id="s-alerts">0</div>
      <div class="stat-sub" id="s-alerts-enabled">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Logs in memory</div>
      <div class="stat-value c-purple" id="s-logs">0</div>
      <div class="stat-sub">max 1,000</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Telegram</div>
      <div class="stat-value c-orange" id="s-telegram">—</div>
      <div class="stat-sub">notification bot</div>
    </div>
  </div>

  <div class="log-section">
    <div class="log-toolbar">
      <div class="filter-tabs">
        <button class="tab active" data-type="all">ทั้งหมด</button>
        <button class="tab" data-type="price"><i class="fa-solid fa-dollar-sign"></i> Price</button>
        <button class="tab" data-type="alert"><i class="fa-solid fa-bell"></i> Alert</button>
        <button class="tab" data-type="error"><i class="fa-solid fa-triangle-exclamation"></i> Error</button>
        <button class="tab" data-type="push"><i class="fa-solid fa-arrow-up-from-bracket"></i> Push</button>
        <button class="tab" data-type="telegram"><i class="fa-brands fa-telegram"></i> Telegram</button>
        <button class="tab" data-type="system"><i class="fa-solid fa-gear"></i> System</button>
      </div>
      <div class="toolbar-right">
        <span id="log-count-badge">0 entries</span>
        <button class="pause-btn" id="pause-btn" onclick="togglePause()"><i class="fa-solid fa-pause"></i> Pause</button>
        <button class="clear-btn" onclick="clearLogs()"><i class="fa-solid fa-trash"></i> Clear</button>
      </div>
    </div>

    <div class="log-container">
      <div id="log-list">
        <div class="empty-log">
          <i class="fa-solid fa-satellite-dish"></i>
          <p>กำลังรอ log...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let token = null;
let activeFilter = 'all';
let paused = false;
let allLogs = [];
let statsTimer = null;

// --- Login ---
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  try {
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const data = await res.json();
    if (data.success) {
      token = data.token;
      sessionStorage.setItem('admin_token', token);
      showDashboard();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  } catch {
    document.getElementById('login-error').style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('admin_token');
  token = null;
  if (statsTimer) clearInterval(statsTimer);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

// --- Auto-restore session ---
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('admin_token');
  if (saved) { token = saved; showDashboard(); }
});

// --- Dashboard ---
function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
  connectSSE();
  fetchStats();
  statsTimer = setInterval(fetchStats, 5000);
  setupFilterTabs();
}

// --- SSE ---
function connectSSE() {
  const es = new EventSource(`/admin/api/stream?token=${token}`);

  es.onopen = () => {
    document.getElementById('live-dot').style.background = 'var(--green)';
  };

  es.onmessage = (e) => {
    const payload = JSON.parse(e.data);
    if (payload.type === '__init__') {
      allLogs = payload.logs;
      renderLogs();
    } else {
      if (!paused) {
        allLogs.unshift(payload);
        if (allLogs.length > 1000) allLogs.pop();
        renderLogs();
      }
    }
  };

  es.onerror = () => {
    document.getElementById('live-dot').style.background = 'var(--red)';
    setTimeout(() => connectSSE(), 3000);
    es.close();
  };
}

// --- Render logs ---
function renderLogs() {
  const list = document.getElementById('log-list');
  const filtered = activeFilter === 'all' ? allLogs : allLogs.filter(l => l.type === activeFilter);

  document.getElementById('log-count-badge').textContent = `${filtered.length} entries`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-log"><i class="fa-solid fa-circle-info"></i><p>ไม่มี log ในหมวด "${activeFilter}"</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(log => `
    <div class="log-entry type-${log.type}">
      <span class="log-time">${formatTime(log.ts)}</span>
      <span class="log-type-badge badge-${log.type}">${log.type}</span>
      <span class="log-msg">${escHtml(log.message)}</span>
    </div>
  `).join('');
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// --- Stats ---
async function fetchStats() {
  try {
    const res = await fetch(`/admin/api/stats?token=${token}`);
    if (res.status === 401) { doLogout(); return; }
    const d = await res.json();

    const price = d.currentPrice.price;
    const change = d.currentPrice.change;
    const pStr = price > 0 ? `$${price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}` : '$0.00';
    const sign = change >= 0 ? '+' : '';
    const cStr = `${sign}${change.toFixed(3)} (${sign}${d.currentPrice.changePercent?.toFixed(2) ?? '0.00'}%)`;

    document.getElementById('s-price').textContent = pStr;
    document.getElementById('s-change').textContent = cStr;
    document.getElementById('s-change').style.color = change >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('live-price-top').textContent = pStr;

    document.getElementById('s-uptime').textContent = formatUptime(d.uptime);
    document.getElementById('s-alerts').textContent = d.activeAlerts;
    document.getElementById('s-alerts-enabled').textContent = d.alertsEnabled ? 'เปิดใช้งาน' : 'ปิดอยู่';
    document.getElementById('s-logs').textContent = d.logCount.toLocaleString();
    document.getElementById('s-telegram').textContent = d.telegramConfigured ? 'ตั้งค่าแล้ว' : 'ยังไม่ตั้งค่า';
    document.getElementById('s-telegram').style.color = d.telegramConfigured ? 'var(--green)' : 'var(--red)';
  } catch {}
}

function formatUptime(s) {
  if (s < 60) return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return `${h}h ${m}m`;
}

// --- Filter tabs ---
function setupFilterTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeFilter = tab.dataset.type;
      renderLogs();
    });
  });
}

// --- Pause ---
function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pause-btn');
  btn.classList.toggle('paused', paused);
  btn.innerHTML = paused
    ? '<i class="fa-solid fa-play"></i> Resume'
    : '<i class="fa-solid fa-pause"></i> Pause';
}

// --- Clear logs ---
async function clearLogs() {
  if (!confirm('ล้าง log ทั้งหมดใช่หรือไม่?')) return;
  await fetch(`/admin/api/logs/clear?token=${token}`, { method: 'POST' });
  allLogs = [];
  renderLogs();
}
</script>
</body>
</html>
